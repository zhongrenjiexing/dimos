name: Bug Report
description: Report a bug in DimOS
title: "[Bug]: "
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the bug
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant logs or error messages
      render: shell
    validations:
      required: false

  - type: input
    id: commit-hash
    attributes:
      label: Commit Hash
      description: "Run: git rev-parse --short HEAD"
      placeholder: "abc1234"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      description: OS and version where this occurs.
      placeholder: macOS 15.4 / Ubuntu 24.04 / Windows 11
    validations:
      required: true

  - type: dropdown
    id: robot-model
    attributes:
      label: Robot Model
      description: Which robot are you using, if any?
      options:
        - N/A
        - Unitree G1
        - Unitree Go2 Pro
        - Unitree Go2 Air
        - Unitree B1
        - Drone
        - Piper
        - xArm
        - Simulation only
        - Other (specify below)
    validations:
      required: false

  - type: input
    id: firmware-version
    attributes:
      label: Firmware Version
      description: Exact firmware version of your robot, if applicable (e.g. 1.0.2.35)
      placeholder: "1.0.2.35"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context — screenshots, environment details, workarounds tried, etc.
    validations:
      required: false
